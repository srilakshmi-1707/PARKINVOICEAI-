<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ text.app_name }}</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: linear-gradient(to right, #e8f5f5, #f0fbfb);
}

.container {
    max-width: 720px;
    margin: 80px auto;
    background: #fff;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    text-align: center;
}

h1 {
    font-size: 36px;
    color: #1f6f78;
    margin-bottom: 10px;
}

h2 {
    font-size: 22px;
    color: #3a3a3a;
    margin-bottom: 20px;
}

p {
    font-size: 18px;
    color: #444;
}

/* ===== Language Selector ===== */
.language-wrapper {
    position: relative;
    display: inline-block;
    margin-top: 25px;
}

.language-btn {
    min-width: 180px;
    padding: 12px 16px;
    font-size: 16px;
    border: 2px solid #1f6f78;
    border-radius: 8px;
    background: white;
    color: #1f6f78;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.language-btn span {
    font-weight: 500;
}

.arrow {
    font-size: 14px;
    margin-left: 12px;
}

/* Dropdown */
.language-menu {
    display: none;
    position: absolute;
    top: 110%;
    left: 0;
    width: 100%;
    background: white;
    border-radius: 8px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    z-index: 1000;
}

.language-menu div {
    padding: 12px;
    cursor: pointer;
    font-size: 16px;
}

.language-menu div:hover {
    background-color: #f2f2f2;
}

.show {
    display: block;
}

/* Disclaimer */
.disclaimer {
    margin-top: 30px;
    padding: 20px;
    background-color: #fff3cd;
    border-left: 6px solid #ff9800;
    font-size: 16px;
    color: #5f4c00;
    text-align: left;
}

/* Proceed button */
.proceed-btn {
    margin-top: 35px;
    padding: 14px 42px;
    font-size: 18px;
    background-color: #1f6f78;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

.proceed-btn:hover {
    background-color: #155e63;
}
</style>
</head>

<body>

<div class="container">
    <h1>{{ text.app_name }}</h1>
    <h2>{{ text.welcome_title }}</h2>
    <p>{{ text.description }}</p>

    <!-- Language selector -->
    <div class="language-wrapper">
        <div class="language-btn" onclick="toggleLang()">
            <span id="selected-lang">
                {{ current_language if current_language else "English" }}
            </span>
            <span class="arrow">▼</span>
        </div>

        <div id="languageMenu" class="language-menu">
            <div onclick="setLanguage('English')">English</div>
            <div onclick="setLanguage('Tamil')">தமிழ்</div>
        </div>
    </div>

    <!-- Disclaimer -->
    <div class="disclaimer">
        <strong>{{ text.disclaimer_title }}:</strong><br>
        {{ text.disclaimer_text }}
    </div>

    <!-- Proceed button -->
    <form action="/signup">
        <button type="submit" class="proceed-btn">
            {{ text.proceed }}
        </button>
    </form>
</div>

<script>
function toggleLang() {
    document.getElementById("languageMenu").classList.toggle("show");
}

function setLanguage(lang) {
    fetch("/set_language", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "language=" + encodeURIComponent(lang)
    })
    .then(() => {
        window.location.reload();
    });
}

document.addEventListener("click", function(event) {
    const wrapper = document.querySelector(".language-wrapper");
    if (!wrapper.contains(event.target)) {
        document.getElementById("languageMenu").classList.remove("show");
    }
});


// Close dropdown if clicked outside
document.addEventListener("click", function(event) {
    const wrapper = document.querySelector(".language-wrapper");
    if (!wrapper.contains(event.target)) {
        document.getElementById("languageMenu").classList.remove("show");
    }
});
</script>

</body>
</html>
